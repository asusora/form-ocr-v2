services:
  mysql:
    image: mysql:8.0
    container_name: form-ocr-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pw}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-form_ocr}
      MYSQL_USER: ${MYSQL_USER:-form_ocr}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-form_ocr_pw}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  backend:
    image: ${BACKEND_IMAGE:-your-dockerhub-username/form-ocr-backend:latest}
    container_name: form-ocr-backend
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      DATA_DIR: /app/data
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://127.0.0.1:8000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  mysql_data:
  backend_data:
