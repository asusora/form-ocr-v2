services:
  mysql:
    image: mysql:8.0
    container_name: form-ocr-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_pw
      MYSQL_DATABASE: form_ocr
      MYSQL_USER: form_ocr
      MYSQL_PASSWORD: form_ocr_pw
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
